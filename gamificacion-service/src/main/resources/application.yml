spring:
  application:
    name: gamificacion-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/db_gamificacion
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8004}

productividad-service:
  url: ${PRODUCTIVIDAD_SERVICE_URL:http://localhost:8002}

progreso-service:
  url: ${PROGRESO_SERVICE_URL:http://localhost:8085}

recompensa-service:
  url: ${RECOMPENSA_SERVICE_URL:http://localhost:8086}

jwt:
  secret: ${JWT_SECRET:focusgame-clave-secreta-compartida-de-al-menos-32-bytes-0123456789}
