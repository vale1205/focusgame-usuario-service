spring:
  application:
    name: usuario-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:5432/db_usuarios
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate          # NUNCA 'update'; el esquema lo crea Flyway
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8001}

jwt:
  secret: ${JWT_SECRET:focusgame-clave-secreta-compartida-de-al-menos-32-bytes-0123456789}
  expiration-ms: 3600000
