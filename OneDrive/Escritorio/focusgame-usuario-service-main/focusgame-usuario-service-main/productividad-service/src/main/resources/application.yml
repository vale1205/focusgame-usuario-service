spring:
  application:
    name: productividad-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/db_productividad
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8082

usuario-service:
  url: ${USUARIO_SERVICE_URL:http://localhost:8084}

jwt:
  secret: ${JWT_SECRET:focusgame-clave-secreta-compartida-de-al-menos-32-bytes-0123456789}
