# Levanta PostgreSQL con las DOS bases independientes (BD por microservicio):
#   - db_usuarios       (usuario-service)
#   - db_productividad  (productividad-service)
services:
  postgres:
    image: postgres:16
    container_name: focusgame-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  usuario-service:
    build:
      context: ./usuario-service
    container_name: focusgame-usuario-service
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      SERVER_PORT: 8081
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy

  productividad-service:
    build:
      context: ./productividad-service
    container_name: focusgame-productividad-service
    environment:
      DB_HOST: postgres
      DB_USER: postgres
      DB_PASS: postgres
      SERVER_PORT: 8082
      USUARIO_SERVICE_URL: http://usuario-service:8081
    ports:
      - "8082:8082"
    depends_on:
      - usuario-service

volumes:
  postgres_data:
