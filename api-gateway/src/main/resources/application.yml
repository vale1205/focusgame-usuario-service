spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: usuario-service
          uri: ${USUARIO_SERVICE_URL:http://localhost:8001}
          predicates:
            - Path=/api/usuarios/**,/api/auth/**
        - id: productividad-service
          uri: ${PRODUCTIVIDAD_SERVICE_URL:http://localhost:8002}
          predicates:
            - Path=/api/tareas/**,/api/sesiones/**
        - id: gamificacion-service
          uri: ${GAMIFICACION_SERVICE_URL:http://localhost:8004}
          predicates:
            - Path=/api/gamificacion/**

server:
  port: ${SERVER_PORT:8080}
